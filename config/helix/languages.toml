[language-server.basedpyright]
command = "uvx"
args = ["--from", "basedpyright", "basedpyright-langserver", "--stdio"]

[language-server.guile-lsp-server]
command = "guix"
args = ["shell", "guile-lsp-server", "--", "guile-lsp-server", "--stdio"]

[language-server.harper]
command = "harper-ls"
args = ["--stdio"]

[language-server.just]
command = "just-lsp"

[language-server.pylsp]
command = "uvx"
args = [
  "--from",
  "python-lsp-server[all]",
  "--with",
  "pylsp-rope",
  "--with",
  "python-lsp-ruff",
  "pylsp",
]

[language-server.ruff]
command = "uvx"
args = ["ruff", "server"]

[language-server.rust-analyzer.config]
check.workspace = false
rust-analyzer.check.command = "clippy"

[language-server.ty]
command = "uvx"
args = ["ty", "server"]

[language-server.typos]
command = "typos-lsp"

[[language]]
name = "scheme"
language-servers = ["guile-lsp-server"]

[[language]]
name = "just"
language-servers = ["just"]

[[language]]
name = "markdown"
rulers = [80, 120]
auto-format = true

[[language]]
name = "ocaml"
auto-format = true
formatter = { command = "ocamlformat", args = ["--impl", "-"] }

[[language]]
name = "python"
auto-format = true
language-servers = [
  # The configuration of `pylsp` already includes `ruff`
  "pylsp",
  { name = "ty", except-features = [
    "goto-definition",
    "goto-declaration",
    "goto-type-definition",
    "goto-reference",
    "goto-implementation",
  ] },
  { name = "basedpyright", except-features = [
    "goto-definition",
    "goto-declaration",
    "goto-type-definition",
    "goto-reference",
    "goto-implementation",
  ] },
  "typos",
]

[[language]]
name = "rust"
language-servers = ["rust-analyzer", "typos"]

[[language]]
name = "toml"
auto-format = true
formatter = { command = "taplo", args = ["format", "-"] }
