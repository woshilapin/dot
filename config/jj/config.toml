[git]
sign-on-push = true

[signing]
behavior = "drop"
backend = "gpg"
key = "7D7767B4"

[ui]
default-command = ["log"]
diff-editor = ":builtin"
diff-formatter = ["difft", "--color=always", "$left", "$right"]

[remotes.origin]
auto-track-bookmarks = 'regex:".*"'

[remotes.upstream]
auto-track-bookmarks = "exact:main | exact:master"

[user]
name = "Jean SIMARD"
email = "woshilapin@tuziwo.info"

[template-aliases]
signoff_enabled = "false"
'signoff_value(author)' = 'stringify(author.name() ++ " <" ++ author.email() ++ ">")'

[templates]
commit_trailers = '''
if(
  signoff_enabled && !self.trailers().any(
    |trailer|
      trailer.key() == "Signed-off-by"
      && trailer.value() == signoff_value(self.author())
  ),
  "Signed-off-by: " ++ signoff_value(self.author())
)
'''
